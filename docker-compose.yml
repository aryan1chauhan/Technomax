version: "3.9"

services:

  db:
    image: postgres:15
    container_name: mediroute_db
    environment:
      POSTGRES_DB: mediroute
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mediroute123
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: mediroute_backend
    environment:
      DATABASE_URL: postgresql://postgres:mediroute123@db:5432/mediroute
      SECRET_KEY: mediroute_hackathon_secret_2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/ml_training:/app/ml_training  # persist model file

  frontend:
    build: ./frontend
    container_name: mediroute_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
